<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selo Operador LOTEP</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            color: #334155;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 40px;
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 12px;
        }

        h1 {
            color: #0f172a;
            font-size: 26px;
            margin-top: 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        p {
            line-height: 1.7;
            color: #475569;
            font-size: 16px;
        }

        .iframe-wrapper {
            margin-top: 35px;
            border: 2px dashed #cbd5e1;
            padding: 30px;
            background: #f8fafc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .label {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #94a3b8;
        }

        /* Controles do Switch */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px;
            background: #e2e8f0;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            font-weight: 600;
            color: #334155;
        }

        select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛡️ Integração LOTEP: Demonstração do Selo de Operador</h1>

        <div class="iframe-wrapper">

            <!-- Controles Dinâmicos para demonstração visual -->
            <div class="controls">
                <div class="control-group">
                    <label for="style-switch">Style:</label>
                    <select id="style-switch" onchange="updateSelo()">
                        <option value="footer">Footer (Rodapé Completo)</option>
                        <option value="badge">Badge (Selo Compacto)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="theme-switch">Theme:</label>
                    <select id="theme-switch" onchange="updateSelo()">
                        <option value="black">Black (Escuro)</option>
                        <option value="white">White (Claro)</option>
                    </select>
                </div>
            </div>

            <div class="label">Área Restrita do Selo</div>

            <!-- O placeholder {{SELO_URL}} será injetado de forma transparente pelo backend (server.ts) -->
            <iframe id="selo-iframe" src="{{SELO_URL}}" width="100%" height="550" frameborder="0" scrolling="no"
                allowtransparency="true"></iframe>

        </div>
    </div>
    <div class="footer">Projeto de Referência Didática - Nunca compartilhe a sua Client Secret no frontend!</div>

    <script>
        // A URL segura (com assinatura HMAC) gerada pelo backend fica guardada na base
        const baseSeloUrl = "{{SELO_URL}}";

        // Função JavaScript simples para alterar apenas os parâmetros visuais
        // Como a assinatura HMAC avalia apenas CNPJ e Timestamp, alterar 'style' e 'theme' no frontend é seguro e não invalida o token.
        function updateSelo() {
            const style = document.getElementById('style-switch').value;
            const theme = document.getElementById('theme-switch').value;
            const iframe = document.getElementById('selo-iframe');

            try {
                // Usa URL API do navegador para modificar os query params de forma elegante
                const urlObj = new URL(baseSeloUrl.replace(/&amp;/g, '&')); // Previne codificações HTML na injeção
                urlObj.searchParams.set('style', style);
                urlObj.searchParams.set('theme', theme);

                // Ajusta as dimensões do iframe conforme a recomendação da LOTEP
                if (style === 'badge') {
                    iframe.width = "450";
                    iframe.height = "180";
                } else {
                    iframe.width = "100%";
                    iframe.height = "550";
                }

                iframe.src = urlObj.toString();
            } catch (e) {
                console.error("Erro ao fazer parse da URL", e);
            }
        }

        // Inicializa os selects com os valores atuais da URL que veio do backend
        window.onload = function () {
            try {
                const urlObj = new URL(baseSeloUrl.replace(/&amp;/g, '&'));
                const currentStyle = urlObj.searchParams.get('style');
                const currentTheme = urlObj.searchParams.get('theme');

                if (currentStyle) document.getElementById('style-switch').value = currentStyle;
                if (currentTheme) document.getElementById('theme-switch').value = currentTheme;

                // Dispara a atualização visual inicial para garantir o tamanho correto do iframe
                updateSelo();
            } catch (e) {
                // Evita erro no console se a URL não for injetada corretamente no momento do dev
            }
        }
    </script>
</body>

</html>
