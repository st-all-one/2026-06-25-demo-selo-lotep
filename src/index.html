<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selo Dinâmico LOTEP - Acessibilidade Inclusiva</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">

    <style>
        /*
     * TEMA PADRÃO: Claro, Elegante e Moderno
     */
        :root {
            --bg-color: #f4f7f6;
            --content-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
            --focus-color: #2563eb;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --border-width: 1px;
            --select-bg: #f8fafc;
            /* Seta svg cinza escuro para select no modo light */
            --svg-arrow: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231e293b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        /*
     * TEMA ALTO CONTRASTE (WCAG AAA / eMAG Premium Black & White)
     */
        body.high-contrast {
            --bg-color: #000000;
            --content-bg: #000000;
            --text-color: #FFFFFF;
            --border-color: #FFFFFF;
            --focus-color: #FFFFFF;
            --shadow: none;
            --radius: 0px;
            --border-width: 3px;
            --select-bg: #000000;
            /* Seta svg branca para select no modo high contrast */
            --svg-arrow: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
            font-size: 1rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Foco acessível WCAG */
        *:focus-visible {
            outline: 4px solid var(--focus-color) !important;
            outline-offset: 4px !important;
            border-radius: 2px;
        }

        /* Barra Superior de Acessibilidade */
        .a11y-bar {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 2rem;
            background-color: var(--content-bg);
            border-bottom: var(--border-width) solid var(--border-color);
            transition: all 0.3s ease;
        }

        .btn-contrast {
            background: var(--bg-color);
            color: var(--text-color);
            border: var(--border-width) solid var(--border-color);
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-contrast:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        body.high-contrast .btn-contrast:hover {
            box-shadow: none;
            background-color: #FFFFFF;
            color: #000000;
        }

        header {
            padding: 3rem 1rem 1rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        main {
            max-width: 1500px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }


        /* Box Model para Painéis (Modo Claro vs Alto Contraste) */
        .panel {
            background-color: var(--content-bg);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            width: 100%;
            margin-bottom: 3rem;
            transition: all 0.3s ease;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        label {
            font-size: 1.125rem;
            font-weight: 600;
        }

        select {
            appearance: none;
            background-color: var(--select-bg);
            color: var(--text-color);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem 3rem 1rem 1.25rem;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            background-image: var(--svg-arrow);
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 1rem auto;
            transition: all 0.3s ease;
        }

        .iframe-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label-wrapper {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2.5rem;
        }

        iframe {
            background-color: transparent;
            transition: width 0.3s ease, height 0.3s ease;
        }

        footer {
            border-top: var(--border-width) solid var(--border-color);
            padding: 2rem 1rem;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            margin-top: auto;
            background-color: var(--content-bg);
        }

        .visually-hidden {
            position: absolute !important;
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            margin: -1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            white-space: nowrap !important;
            border: 0 !important;
        }
    </style>
</head>

<body>
    <div id="app-config" data-selo-url="{{SELO_URL}}" aria-hidden="true" class="visually-hidden"></div>

    <!-- Barra Superior de Acessibilidade -->
    <nav class="a11y-bar" aria-label="Barra de Acessibilidade">
        <button id="contrast-toggle" class="btn-contrast" aria-pressed="false" title="Alternar Modo de Alto Contraste">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                aria-hidden="true">
                <path d="M12 2v20A10 10 0 1 0 12 2Z" />
            </svg>
            <span id="contrast-btn-text">Alto Contraste</span>
        </button>
    </nav>

    <header role="banner">
        <h1>Demonstrativo do Selo LOTEP</h1>
    </header>

    <main role="main">

        <section class="panel controls" aria-labelledby="controls-title">
            <h2 id="controls-title" class="visually-hidden">Controles de Visualização do Selo</h2>

            <div class="control-group">
                <label for="style-switch">Formato do Selo</label>
                <select id="style-switch" aria-controls="selo-iframe" title="Alterar o formato do selo">
                    <option value="footer">Rodapé Completo (Footer)</option>
                    <option value="badge">Selo Compacto (Badge)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="theme-switch">Tema Interno do Selo</label>
                <select id="theme-switch" aria-controls="selo-iframe" title="Alterar o tema de cores do selo interno">
                    <option value="black">Tema Escuro (Black)</option>
                    <option value="white">Tema Claro (White)</option>
                </select>
            </div>
        </section>

        <section class="panel iframe-wrapper" aria-labelledby="iframe-title">
            <h2 id="iframe-title" class="label-wrapper">Área Segura do Selo</h2>
            <iframe id="selo-iframe" src="about:blank" title="Selo Oficial Dinâmico de Operador Autorizado LOTEP"
                width="100%" height="550" frameborder="0" scrolling="no" allowtransparency="true"></iframe>
        </section>

        <!-- Região ARIA-Live para feedbacks de tela invisíveis -->
        <div id="a11y-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
    </main>

    <footer role="contentinfo">
        <p>Exemplo didático para demonstrativo do Selo de Operador LOTEP</p>
    </footer>

    <script src="/main.js"></script>
</body>

</html>
